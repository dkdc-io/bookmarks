name: Release Rust

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.0)"
        required: true

permissions:
  contents: read

jobs:
  check:
    uses: dkdc-io/.github/.github/workflows/check.yml@v1

  publish:
    name: Publish to crates.io
    needs: check
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - run: bin/setup
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: crates-io-${{ hashFiles('Cargo.lock') }}
          restore-keys: crates-io-
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"

          crate_version_exists() {
            local crate="$1"
            curl -fsSL "https://crates.io/api/v1/crates/${crate}/versions" \
              | jq -e --arg version "$version" '.versions[] | select(.num == $version and (.yanked | not))' >/dev/null
          }

          wait_for_crate_version() {
            local crate="$1"
            for _ in {1..12}; do
              if crate_version_exists "$crate"; then
                return 0
              fi
              sleep 10
            done
            echo "::error::${crate} ${version} was not visible on crates.io after publishing"
            return 1
          }

          publish_crate() {
            local crate="$1"
            if crate_version_exists "$crate"; then
              echo "${crate} ${version} already exists on crates.io, skipping publish"
            else
              echo "Publishing ${crate} ${version}..."
              cargo publish -p "$crate"
            fi
            wait_for_crate_version "$crate"
          }

          publish_crate dkdc-bookmarks-core
          publish_crate dkdc-bookmarks-webapp
          publish_crate dkdc-bookmarks-app
          publish_crate dkdc-bookmarks
